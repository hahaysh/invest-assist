<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>투자 비서 웹앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text-main: #f8fafc;
        --text-sub: #94a3b8;
        --accent: #f59e0b;
        --up: #22c55e;
        --down: #ef4444;
      }

      
      body {
        background: radial-gradient(1200px 700px at 10% -10%, #1e293b 0%, var(--bg) 55%, #020617 100%);
        color: var(--text-main);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      }

      .spin {
        border: 3px solid rgba(245, 158, 11, 0.2);
        border-top-color: var(--accent);
        border-radius: 9999px;
        width: 1rem;
        height: 1rem;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .md-content h1,
      .md-content h2,
      .md-content h3,
      .md-content h4 {
        color: #f8fafc;
        margin-top: 1rem;
        margin-bottom: 0.6rem;
        line-height: 1.3;
      }

      .md-content h1 {
        font-size: 1.8rem;
        font-weight: 700;
      }

      .md-content h2 {
        font-size: 1.5rem;
        font-weight: 700;
      }

      .md-content h3 {
        font-size: 1.2rem;
        font-weight: 600;
      }

      .md-content p,
      .md-content li {
        color: #cbd5e1;
        line-height: 1.65;
      }

      .md-content ul {
        list-style: disc;
        padding-left: 1.25rem;
      }

      .md-content table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.9rem;
        margin-bottom: 0.9rem;
        border: 1px solid #334155;
      }

      .md-content th,
      .md-content td {
        border: 1px solid #334155;
        padding: 0.5rem 0.65rem;
      }

      .md-content th {
        background-color: #0b1220;
        color: #f8fafc;
      }

      .md-content td {
        background-color: #182338;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 40;
        background-color: rgba(0, 0, 0, 0.5);
        -webkit-backdrop-filter: blur(2px);
        backdrop-filter: blur(2px);
      }

      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background-color: var(--card);
        border: 1px solid #334155;
        border-radius: 1rem;
        padding: 1.5rem;
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        max-width: 600px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div class="mx-auto max-w-7xl px-4 py-5 md:px-8 md:py-8">
      <header class="rounded-2xl border border-slate-700 bg-slate-900/80 p-4 backdrop-blur md:p-5">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <h1 class="text-2xl font-bold tracking-tight md:text-3xl" data-i18n="appHeading">투자 비서 대시보드</h1>
            <p class="mt-1 text-sm text-slate-400" data-i18n="appSubtitle">FastAPI + Vanilla JS + Tailwind CDN</p>
          </div>
          <div class="flex flex-col gap-3 md:items-end">
            <div class="flex items-center justify-end gap-2">
              <label for="languageSelect" class="sr-only" data-i18n="languageSelectorLabel">언어 선택</label>
              <select id="languageSelect" class="rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm text-slate-100">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="fr">Français</option>
              </select>
            </div>
            <nav class="grid grid-cols-3 gap-2 rounded-xl bg-slate-800/70 p-1">
              <button data-tab="dashboard" class="nav-tab rounded-lg px-3 py-2 text-sm font-semibold" data-i18n="navDashboard">대시보드</button>
              <button data-tab="portfolio" class="nav-tab rounded-lg px-3 py-2 text-sm font-semibold" data-i18n="navPortfolio">포트폴리오</button>
              <button data-tab="watchlist" class="nav-tab rounded-lg px-3 py-2 text-sm font-semibold" data-i18n="navWatchlist">관심종목</button>
            </nav>
          </div>
        </div>
      </header>

      <main class="mt-6">
        <section id="tab-dashboard" class="tab-panel space-y-5">
          <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <article class="rounded-2xl border border-slate-700 p-4" style="background-color: var(--card)">
              <p class="text-sm text-slate-400" data-i18n="latestDailyLabel">최신 일일 브리핑 날짜</p>
              <p id="latestDaily" class="mt-2 text-2xl font-bold" style="color: var(--accent)">-</p>
            </article>
            <article class="rounded-2xl border border-slate-700 p-4" style="background-color: var(--card)">
              <p class="text-sm text-slate-400" data-i18n="latestWeeklyLabel">최신 주간 리포트 주차</p>
              <p id="latestWeekly" class="mt-2 text-2xl font-bold" style="color: var(--accent)">-</p>
            </article>
          </div>

          <div class="flex flex-col gap-3 sm:flex-row">
            <button
              id="runDailyBtn"
              class="inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2.5 font-semibold text-slate-950 transition hover:brightness-105"
              style="background-color: var(--accent)"
            >
              <span data-i18n="runDaily">일일 브리핑 실행</span>
              <span id="runDailySpinner" class="spin hidden"></span>
            </button>
            <button
              id="runWeeklyBtn"
              class="inline-flex items-center justify-center gap-2 rounded-xl border px-4 py-2.5 font-semibold transition hover:bg-amber-500/10"
              style="border-color: var(--accent); color: var(--accent)"
            >
              <span data-i18n="runWeekly">주간 리포트 실행</span>
              <span id="runWeeklySpinner" class="spin hidden"></span>
            </button>
          </div>

          <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
            <article class="rounded-2xl border border-slate-700 p-4" style="background-color: var(--card)">
              <h2 class="mb-3 text-lg font-semibold" data-i18n="dailyListTitle">일일 브리핑 목록</h2>
              <select id="dailyList" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm text-slate-100"></select>
            </article>
            <article class="rounded-2xl border border-slate-700 p-4" style="background-color: var(--card)">
              <h2 class="mb-3 text-lg font-semibold" data-i18n="weeklyListTitle">주간 리포트 목록</h2>
              <select id="weeklyList" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm text-slate-100"></select>
            </article>
          </div>

          <article class="rounded-2xl border border-slate-700 p-4 md:p-6" style="background-color: var(--card)">
            <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
              <div class="flex gap-2">
                <button data-viewer-tab="daily" class="viewer-tab rounded-lg px-3 py-2 text-sm font-semibold" data-i18n="viewerTabDaily">일일</button>
                <button data-viewer-tab="weekly" class="viewer-tab rounded-lg px-3 py-2 text-sm font-semibold" data-i18n="viewerTabWeekly">주간</button>
              </div>
              <div class="w-full md:w-72">
                <label for="reportSelect" class="mb-1 block text-xs text-slate-400" data-i18n="reportSelectLabel">리포트 선택</label>
                <select id="reportSelect" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm text-slate-100"></select>
              </div>
            </div>
            <p id="viewerMeta" class="mb-3 text-xs text-slate-400"></p>
            <div id="viewer" class="md-content min-h-[260px] rounded-xl border border-slate-700 bg-slate-900 p-4"></div>
          </article>
        </section>

        <!-- Portfolio Tab -->
        <section id="tab-portfolio" class="tab-panel hidden">
          <article class="rounded-2xl border border-slate-700 p-4 md:p-6" style="background-color: var(--card)">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-xl font-semibold" data-i18n="portfolioTitle">포트폴리오</h2>
              <button id="addPortfolioBtn" class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-950 transition hover:brightness-105" style="background-color: var(--accent)" data-i18n="addItemButton">+ 종목 추가</button>
            </div>
            <div id="portfolioSummary" class="mb-4 grid grid-cols-1 gap-3 lg:grid-cols-3">
              <div class="rounded-xl border border-slate-700 bg-slate-900 p-3 text-sm text-slate-300" data-i18n="summaryLoading">요약 로딩 중...</div>
            </div>
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm border-collapse">
                <thead class="bg-slate-900 text-slate-200">
                  <tr>
                    <th class="px-3 py-2 text-left" data-i18n="tableTicker">Ticker</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableCompanyName">종목명</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableMarket">시장</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableQuantity">수량</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableAvgCost">평단</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableCurrency">통화</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableWeight">비중</th>
                    <th class="px-3 py-2 text-left" data-i18n="tableStatus">상태</th>
                    <th class="px-3 py-2 text-center" data-i18n="tableActions">작업</th>
                  </tr>
                </thead>
                <tbody id="portfolioRows" class="divide-y divide-slate-700"></tbody>
              </table>
            </div>
          </article>
        </section>

        <!-- 관심종목 Tab -->
        <section id="tab-watchlist" class="tab-panel hidden">
          <article class="rounded-2xl border border-slate-700 p-4 md:p-6" style="background-color: var(--card)">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-xl font-semibold" data-i18n="watchlistTitle">관심종목</h2>
              <button id="addWatchlistBtn" class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-950 transition hover:brightness-105" style="background-color: var(--accent)" data-i18n="addItemButton">+ 종목 추가</button>
            </div>
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <div id="watchlistGrid" class="contents"></div>
            </div>
          </article>
        </section>
      </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="pointer-events-none fixed right-4 top-4 z-50 hidden rounded-lg border px-4 py-3 text-sm font-medium shadow-lg"></div>

    <!-- Portfolio Modal -->
    <div id="portfolioModal" class="modal">
      <div class="modal-content">
        <h2 id="portfolioModalTitle" class="mb-4 text-xl font-semibold">종목 추가</h2>
        <form id="portfolioForm" class="space-y-3">
          <div>
            <label class="block text-xs text-slate-400" data-i18n="portfolioSelectWatchlistLabel">관심종목에서 선택 (선택사항)</label>
            <select id="portfolioWatchlistSelect" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100">
              <option value="" data-i18n="portfolioSelectWatchlistPlaceholder">— 관심종목에서 선택하면 자동 채워집니다 —</option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelTickerRequired">Ticker *</label>
              <input id="portfolioTicker" type="text" required placeholder="AAPL" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelCompanyRequired">종목명 *</label>
              <input id="portfolioCompanyName" type="text" required placeholder="Apple" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelMarket">시장</label>
              <select id="portfolioMarket" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100">
                <option value="KRX">KRX</option>
                <option value="NYSE">NYSE</option>
                <option value="NASDAQ">NASDAQ</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelHoldingStatus">상태</label>
              <select id="portfolioHoldingStatus" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100">
                <option value="active" data-i18n="holdingStatusActive">active</option>
                <option value="cash" data-i18n="holdingStatusCash">cash</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelQuantity">수량</label>
              <input id="portfolioQuantity" type="number" placeholder="100" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelAvgCost">평단가</label>
              <input id="portfolioAvgCost" type="number" step="0.01" placeholder="150.50" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelCurrency">통화</label>
              <select id="portfolioCurrency" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100">
                <option value="KRW">KRW</option>
                <option value="USD">USD</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelTargetWeight">목표 비중</label>
              <input id="portfolioTargetWeight" type="number" step="0.01" placeholder="0.15" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelPriority">우선순위 (1-5)</label>
              <input id="portfolioPriority" type="number" min="1" max="5" placeholder="1" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div>
            <label class="block text-xs text-slate-400" data-i18n="labelThesis">투자논리</label>
            <textarea id="portfolioThesis" placeholder="투자 논리를 입력하세요" data-i18n-placeholder="placeholderThesis" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" rows="2"></textarea>
          </div>

          <div>
            <label class="block text-xs text-slate-400" data-i18n="labelRiskNotes">위험 노트</label>
            <textarea id="portfolioRiskNotes" placeholder="위험 요소를 입력하세요" data-i18n-placeholder="placeholderRiskNotes" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" rows="2"></textarea>
          </div>

          <div class="flex gap-3 pt-4">
            <button id="savePortfolioBtn" type="submit" class="flex-1 rounded-lg px-3 py-2 text-sm font-semibold text-slate-950 transition hover:brightness-105" style="background-color: var(--accent)" data-i18n="buttonSave">저장</button>
            <button type="button" id="closePortfolioModal" class="flex-1 rounded-lg border border-slate-500 px-3 py-2 text-sm font-semibold hover:bg-slate-800" data-i18n="buttonCancel">취소</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 관심종목 Modal -->
    <div id="watchlistModal" class="modal">
      <div class="modal-content">
        <h2 id="watchlistModalTitle" class="mb-4 text-xl font-semibold">종목 추가</h2>
        <form id="watchlistForm" class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelTickerRequired">Ticker *</label>
              <input id="watchlistTicker" type="text" required placeholder="MSFT" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelCompanyRequired">종목명 *</label>
              <input id="watchlistCompanyName" type="text" required placeholder="Microsoft" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelMarket">시장</label>
              <input id="watchlistMarket" type="text" placeholder="NASDAQ" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
            <div>
              <label class="block text-xs text-slate-400">
                <span data-i18n="labelIdealEntry">진입가</span> <span id="watchlistCurrencyBadge" class="ml-1 text-slate-500"></span>
              </label>
              <input id="watchlistIdealEntry" type="number" step="0.01" placeholder="380.0" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div>
            <label class="block text-xs text-slate-400" data-i18n="labelWatchReason">관심 이유</label>
            <textarea id="watchlistWatchReason" placeholder="관심 이유를 입력하세요" data-i18n-placeholder="placeholderWatchReason" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" rows="2"></textarea>
          </div>

          <div>
            <label class="block text-xs text-slate-400" data-i18n="labelTriggerCondition">진입 조건</label>
            <textarea id="watchlistTriggerCondition" placeholder="진입 조건을 입력하세요" data-i18n-placeholder="placeholderTriggerCondition" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" rows="2"></textarea>
          </div>

          <div>
            <label class="block text-xs text-slate-400" data-i18n="labelInvalidation">부정 조건</label>
            <textarea id="watchlistInvalidation" placeholder="부정 조건을 입력하세요" data-i18n-placeholder="placeholderInvalidation" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" rows="2"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelRiskNotes">위험 노트</label>
              <input id="watchlistRiskNotes" type="text" placeholder="위험 요소" data-i18n-placeholder="placeholderRiskItem" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
            <div>
              <label class="block text-xs text-slate-400" data-i18n="labelPriority">우선순위 (1-5)</label>
              <input id="watchlistPriority" type="number" min="1" max="5" placeholder="1" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-base text-slate-100" />
            </div>
          </div>

          <div class="flex gap-3 pt-4">
            <button id="saveWatchlistBtn" type="submit" class="flex-1 rounded-lg px-3 py-2 text-sm font-semibold text-slate-950 transition hover:brightness-105" style="background-color: var(--accent)" data-i18n="buttonSave">저장</button>
            <button type="button" id="closeWatchlistModal" class="flex-1 rounded-lg border border-slate-500 px-3 py-2 text-sm font-semibold hover:bg-slate-800" data-i18n="buttonCancel">취소</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const SUPPORTED_LANGUAGES = ["ko", "en", "ja", "zh", "fr"];
      const LOCALE_MAP = {
        ko: "ko-KR",
        en: "en-US",
        ja: "ja-JP",
        zh: "zh-CN",
        fr: "fr-FR",
      };

      const TRANSLATIONS = {
        ko: {
          appTitle: "투자 비서 웹앱",
          appHeading: "투자 비서 대시보드",
          appSubtitle: "FastAPI + Vanilla JS + Tailwind CDN",
          languageSelectorLabel: "언어 선택",
          navDashboard: "대시보드",
          navPortfolio: "포트폴리오",

      function normalizeLanguage(language) {
        const normalized = String(language || "").toLowerCase();
        if (!normalized) return "ko";
        if (SUPPORTED_LANGUAGES.includes(normalized)) return normalized;
        if (normalized.startsWith("zh")) return "zh";
        if (normalized.startsWith("fr")) return "fr";
        if (normalized.startsWith("ja")) return "ja";
        if (normalized.startsWith("en")) return "en";
        if (normalized.startsWith("ko")) return "ko";
        return "ko";
      }

      function getCurrentLocale() {
        return LOCALE_MAP[state.language] || LOCALE_MAP.ko;
      }

      function t(key, vars = {}) {
        const messages = TRANSLATIONS[state.language] || TRANSLATIONS.ko;
        const fallbackMessages = TRANSLATIONS.ko;
        const template = messages[key] ?? fallbackMessages[key] ?? key;
        return Object.entries(vars).reduce((text, [name, value]) => text.replaceAll(`{${name}}`, String(value)), template);
      }

      function getInitialLanguage() {

          if (saved) {

        return normalizeLanguage(navigator.language || navigator.userLanguage || "ko");

      function showToast(message, isError = false) {
        toast.textContent = message;
        toast.className = "pointer-events-none fixed right-4 top-4 z-50 rounded-lg border px-4 py-3 text-sm font-medium shadow-lg";
        if (isError) {

        } else {
          toast.classList.add("border-green-400", "bg-green-900/30", "text-green-200");
        }
        toast.classList.remove("hidden");
        window.setTimeout(() => toast.classList.add("hidden"), 2200);

      function formatApiDetail(detail) {
        if (Array.isArray(detail)) {
          return detail
            .map((item) => {
              if (typeof item === "string") return item;
              if (item && typeof item === "object") {
                const loc = Array.isArray(item.loc) ? item.loc.join(".") : "";
                const msg = item.msg || JSON.stringify(item);
                return loc ? `${loc}: ${msg}` : msg;
              }
              return String(item);
            })
            .join(" | ");
        }
        if (detail && typeof detail === "object") {
          return detail.message || JSON.stringify(detail);
        }
        return detail ? String(detail) : t("genericRequestError");
      }

      async function apiFetch(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(formatApiDetail(data.detail));
        }
        return data;
      }

      function getTickerLink(ticker, market) {
        const t = String(ticker || "").trim().toUpperCase();
        if (String(market || "").toUpperCase() === "KRX") {
          const code = t.replace(/\.(KS|KQ)$/, "");
          return `https://finance.naver.com/item/main.naver?code=${code}`;
        }
        return `https://finance.yahoo.com/quote/${t}`;
      }

      function formatNumber(value, digits = 0) {
        const num = Number(value || 0);
        if (Number.isNaN(num)) return "0";
        return new Intl.NumberFormat(getCurrentLocale(), {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        }).format(num);
      }

      function formatMoney(currency, value) {
        const currencyCode = String(currency || "").toUpperCase() === "USD" ? "USD" : "KRW";
        const digits = currencyCode === "USD" ? 2 : 0;
        return new Intl.NumberFormat(getCurrentLocale(), {
          style: "currency",
          currency: currencyCode,
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        }).format(Number(value || 0));
      }

      function formatPercent(value) {
        const num = Number(value || 0);
        if (Number.isNaN(num)) return "0.00%";
        return new Intl.NumberFormat(getCurrentLocale(), {
          style: "percent",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(num / 100);
      }

      function convertUsdToKrw(usdAmount, exchangeRate = 1300) {
        return usdAmount * exchangeRate;

      function renderReportList(targetId, list, type) {
        const sel = document.getElementById(targetId);
        sel.innerHTML = "";

        if (!list.length) {
          sel.innerHTML = `<option value="">${t("noReports")}</option>`;
          return;
        }

        sel.innerHTML = `<option value="">${t("selectReportPlaceholder")}</option>`;
        list.forEach((item) => {
          const key = type === "daily" ? item.date : item.week;
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = key;
          sel.appendChild(opt);
        });
        sel.addEventListener("change", function handler() {
          const key = sel.value;
          if (!key) return;
          setViewerTab(type);
          reportSelect.value = key;
          loadReport(type, key);
          window.scrollTo({ top: document.body.scrollHeight * 0.2, behavior: "smooth" });
        });
      }

      function populateReportSelect() {
        const source = state.viewerType === "daily" ? state.dailyReports : state.weeklyReports;
        const keyName = state.viewerType === "daily" ? "date" : "week";

        reportSelect.innerHTML = "";
        if (!source.length) {
          reportSelect.innerHTML = `<option value="">${t("noSelectableReports")}</option>`;
          viewer.innerHTML = `<p class="text-slate-500">${t("noReports")}</p>`;
          viewerMeta.textContent = "";
          return;
        }

        source.forEach((item) => {
          const option = document.createElement("option");
          option.value = item[keyName];
          option.textContent = item[keyName];
          reportSelect.appendChild(option);
        });

        loadReport(state.viewerType, reportSelect.value);
      }

      function colorizeArrows(container) {
        container.querySelectorAll("p, li, td, th, h1, h2, h3, h4").forEach((node) => {
          const text = node.textContent || "";
          if (text.includes("▲")) {
            node.style.color = "var(--up)";
          }
          if (text.includes("▼")) {
            node.style.color = "var(--down)";
          }
        });
      }

      async function loadReport(type, key) {
        if (!key) {
          return;
        }

        const endpoint = type === "daily" ? `/api/reports/daily/${key}` : `/api/reports/weekly/${key}`;

        try {
          const data = await apiFetch(endpoint);
          const localizedContent = (data.content || "")
            .replace(/\bThesis\b/g, "투자논리")
            .replace(/\bWatchlist\b/g, "관심종목")
            .replace(/\bwatchlist\b/g, "관심종목");
          viewer.innerHTML = DOMPurify.sanitize(marked.parse(localizedContent));
          colorizeArrows(viewer);
          viewerMeta.textContent = type === "daily" ? t("viewerMetaDaily", { value: data.date }) : t("viewerMetaWeekly", { value: data.week });
        } catch (error) {
          viewer.innerHTML = `<p class="text-red-400">${error.message}</p>`;
          viewerMeta.textContent = "";
        }
      }

          state.dailyReports = daily;

          document.getElementById("latestDaily").textContent = status.last_daily || "-";
          document.getElementById("latestWeekly").textContent = status.last_weekly || "-";

          renderReportList("dailyList", daily, "daily");
          renderReportList("weeklyList", weekly, "weekly");
          populateReportSelect();

          showToast(error.message, true);

      async function runBriefing(buttonId, spinnerId, doneMessageKey) {
        const button = document.getElementById(buttonId);
        const spinner = document.getElementById(spinnerId);

        button.disabled = true;
        spinner.classList.remove("hidden");
        try {
          await apiFetch("/api/run-briefing", { method: "POST" });
          showToast(t(doneMessageKey));
          await refreshDashboard();
        } catch (error) {
          showToast(error.message, true);
        } finally {
          spinner.classList.add("hidden");
          button.disabled = false;
        }
      }

      // Portfolio Functions
      async function populatePortfolioWatchlistSelect() {
        const select = document.getElementById("portfolioWatchlistSelect");
        try {
          const [watchlistRows, portfolioRows] = await Promise.all([
            apiFetch("/api/watchlist"),
            apiFetch("/api/portfolio")
          ]);
          
          const portfolioTickers = new Set(portfolioRows.map(row => row.ticker));
          select.innerHTML = `<option value="">${t("portfolioSelectWatchlistPlaceholder")}</option>`;
          
          watchlistRows.forEach((row) => {
            if (!portfolioTickers.has(row.ticker)) {
              const option = document.createElement("option");
              option.value = row.ticker;
              option.dataset.companyName = row.company_name;
              option.dataset.market = row.market;
              option.dataset.watchReason = row.watch_reason;
              option.dataset.currency = row.currency || (row.market === "KRX" ? "KRW" : "USD");
              option.dataset.riskNotes = row.risk_notes;
              option.dataset.priority = row.priority;
              option.textContent = `${row.ticker} - ${row.company_name}`;
              select.appendChild(option);
            }
          });
        } catch (error) {
          console.error("watchlist load failed:", error);
        }
      }

      async function fillPortfolioFromWatchlist() {
        const select = document.getElementById("portfolioWatchlistSelect");
        const selectedOption = select.options[select.selectedIndex];
        
        if (!selectedOption.value) {
          return;
        }

        const ticker = selectedOption.value;
        const companyName = selectedOption.dataset.companyName || "";
        const market = selectedOption.dataset.market || "KRX";
        const currency = selectedOption.dataset.currency || "KRW";
        const riskNotes = selectedOption.dataset.riskNotes || "";
        const priority = selectedOption.dataset.priority || "3";
        const watchReason = selectedOption.dataset.watchReason || "";
        const thesisField = document.getElementById("portfolioThesis");

        try {
          state.portfolioAutofillLoading = true;
          setPortfolioAutofillButtonsDisabled(true);

          document.getElementById("portfolioTicker").value = ticker;
          document.getElementById("portfolioTicker").disabled = true;
          document.getElementById("portfolioCompanyName").value = companyName;
          document.getElementById("portfolioMarket").value = market;
          document.getElementById("portfolioCurrency").value = currency;
          document.getElementById("portfolioRiskNotes").value = riskNotes;
          document.getElementById("portfolioPriority").value = priority;

          const thesisParts = [];
          if (watchReason) {
            thesisParts.push(`${t("coreHypothesis")}: ${watchReason}`);
          }

          try {
            const enriched = await apiFetch(`/api/watchlist/enrich?ticker=${encodeURIComponent(ticker)}&lang=${encodeURIComponent(state.language)}`);
            if (enriched.news_summary) {
              thesisParts.push(`${t("newsSummary")}: ${enriched.news_summary}`);
            }
            if (enriched.trigger_condition) {
              thesisParts.push(`${t("entryObservation")}: ${enriched.trigger_condition}`);
            }
            if (enriched.invalidation) {
              thesisParts.push(`${t("invalidationCondition")}: ${enriched.invalidation}`);
            }
          } catch (error) {
            // enrich 실패 시 기본 가설 문구로 계속 진행
          }

          if (!thesisParts.length) {
            thesisParts.push(t("defaultThesis", { name: companyName || ticker }));
          }
          thesisField.value = thesisParts.join(" | ");

          showToast(t("portfolioAutofillDone", { ticker }));
        } finally {
          state.portfolioAutofillLoading = false;
          setPortfolioAutofillButtonsDisabled(false);
        }
      }
      function openPortfolioModal(ticker = null) {
        state.portfolioEditTicker = ticker;
        syncModalTitles();
        
        if (ticker) {
          const rows = document.querySelectorAll("#portfolioRows tr");
          let found = false;
          rows.forEach((row) => {
            if (row.cells[0]?.textContent === ticker) {
              document.getElementById("portfolioTicker").value = row.cells[0].textContent;
              document.getElementById("portfolioTicker").disabled = true;
              document.getElementById("portfolioCompanyName").value = row.cells[1].textContent;
              document.getElementById("portfolioMarket").value = row.cells[2].textContent;
              document.getElementById("portfolioQuantity").value = row.cells[3].textContent;
              document.getElementById("portfolioAvgCost").value = row.cells[4].textContent;
              document.getElementById("portfolioCurrency").value = row.cells[5].textContent;
              document.getElementById("portfolioTargetWeight").value = row.cells[6].textContent;
              document.getElementById("portfolioHoldingStatus").value = row.cells[7].textContent;
              document.getElementById("portfolioPriority").value = row.dataset.priority || "";
              document.getElementById("portfolioThesis").value = row.dataset.thesis || "";
              document.getElementById("portfolioRiskNotes").value = row.dataset.riskNotes || "";
              found = true;
            }
          });
        } else {
          document.getElementById("portfolioTicker").disabled = false;
          portfolioForm.reset();
          document.getElementById("portfolioWatchlistSelect").value = "";
          populatePortfolioWatchlistSelect();
        }
        
        portfolioModal.classList.add("active");
      }

      function closePortfolioModal() {
        if (state.portfolioAutofillLoading) {
          return;
        }
        portfolioModal.classList.remove("active");
        document.getElementById("portfolioTicker").disabled = false;
        portfolioForm.reset();
        state.portfolioEditTicker = null;
      }

      async function savePortfolio(e) {
        e.preventDefault();
        const ticker = document.getElementById("portfolioTicker").value.toUpperCase().trim();

        const quantity = Number(document.getElementById("portfolioQuantity").value);
        const avgCost = Number(document.getElementById("portfolioAvgCost").value);
        const targetWeight = Number(document.getElementById("portfolioTargetWeight").value);
        const priority = Number(document.getElementById("portfolioPriority").value);

        if (!Number.isInteger(quantity) || !Number.isInteger(priority) || Number.isNaN(avgCost) || Number.isNaN(targetWeight)) {
          showToast(t("portfolioValidationError"), true);
          return;
        }

        const body = {
          ticker,
          company_name: document.getElementById("portfolioCompanyName").value,
          market: document.getElementById("portfolioMarket").value,
          quantity,
          avg_cost: avgCost,
          currency: document.getElementById("portfolioCurrency").value,
          target_weight: targetWeight,
          holding_status: document.getElementById("portfolioHoldingStatus").value,
          thesis: document.getElementById("portfolioThesis").value,
          risk_notes: document.getElementById("portfolioRiskNotes").value,
          priority,
        };

        try {
          if (state.portfolioEditTicker) {
            await apiFetch(`/api/portfolio/${state.portfolioEditTicker}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            showToast(t("portfolioUpdated"));
          } else {
            await apiFetch("/api/portfolio", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            showToast(t("portfolioAdded"));
          }
          closePortfolioModal();
          await loadPortfolio();
        } catch (error) {
          showToast(error.message, true);
        }
      }

      async function deletePortfolio(ticker) {
        if (!confirm(t("deleteConfirm", { ticker }))) return;
        try {
          await apiFetch(`/api/portfolio/${ticker}`, { method: "DELETE" });
          showToast(t("portfolioDeleted"));
          await loadPortfolio();
        } catch (error) {
          showToast(error.message, true);
        }
      }

      async function loadPortfolio() {
        const tbody = document.getElementById("portfolioRows");
        const summaryContainer = document.getElementById("portfolioSummary");
        if (summaryContainer) {
          summaryContainer.innerHTML = `<div class="rounded-xl border border-slate-700 bg-slate-900 p-3 text-sm text-slate-300 lg:col-span-3">${t("summaryLoading")}</div>`;
        }
        tbody.innerHTML = `<tr><td colspan="9" class="px-3 py-3 text-slate-400">${t("loading")}</td></tr>`;

        let summaryData = null;
        let summaryError = "";

        try {
          const [rows, summaryResult] = await Promise.all([
            apiFetch("/api/portfolio"),
            apiFetch("/api/portfolio/summary").catch((error) => ({ __error: error })),
          ]);

          if (summaryResult && summaryResult.__error) {
            summaryError = summaryResult.__error.message;
          } else {
            summaryData = summaryResult;
          }

          renderPortfolioSummary(summaryData, summaryError);

          if (!rows.length) {
            tbody.innerHTML = `<tr><td colspan="9" class="px-3 py-3 text-slate-500">${t("noData")}</td></tr>`;
            return;
          }

          tbody.innerHTML = rows
            .map(
              (row) => `
                <tr class="border-b border-slate-700/50" data-priority="${row.priority}" data-thesis="${row.thesis}" data-risk-notes="${row.risk_notes}">
                  <td class="px-3 py-2 font-semibold"><a href="${getTickerLink(row.ticker, row.market)}" target="_blank" rel="noopener noreferrer" class="text-amber-300 hover:text-amber-100 hover:underline">${row.ticker || ""}</a></td>
                  <td class="px-3 py-2"><a href="${getTickerLink(row.ticker, row.market)}" target="_blank" rel="noopener noreferrer" class="text-white hover:text-amber-100 hover:underline">${row.company_name || ""}</a></td>
                  <td class="px-3 py-2">${row.market || ""}</td>
                  <td class="px-3 py-2">${row.quantity || ""}</td>
                  <td class="px-3 py-2">${row.avg_cost || ""}</td>
                  <td class="px-3 py-2">${row.currency || ""}</td>
                  <td class="px-3 py-2">${row.target_weight || ""}</td>
                  <td class="px-3 py-2">${row.holding_status || ""}</td>
                  <td class="px-3 py-2 text-center space-x-1">
                    <button onclick="openPortfolioModal('${row.ticker}')" class="rounded px-2 py-1.5 text-xs text-slate-300 hover:bg-amber-500/20 hover:text-amber-300">${t("edit")}</button>
                    <button onclick="deletePortfolio('${row.ticker}')" class="rounded px-2 py-1.5 text-xs text-slate-300 hover:bg-red-500/20 hover:text-red-300">${t("delete")}</button>
                  </td>
                </tr>
              `,
            )
            .join("");
        } catch (error) {
          renderPortfolioSummary(summaryData, summaryError || error.message);
          tbody.innerHTML = `<tr><td colspan="9" class="px-3 py-3 text-red-400">${error.message}</td></tr>`;
        }
      }

      // Watchlist Functions
      function isBlank(value) {
        return value === null || value === undefined || String(value).trim() === "";
      }

      function setWatchlistCurrencyBadge(currency = "", market = "") {
        const badge = document.getElementById("watchlistCurrencyBadge");
        if (!badge) return;
        const cur = String(currency || "").toUpperCase();
        badge.dataset.currency = cur;
        badge.dataset.market = String(market || "").toUpperCase();
        if (cur === "KRW" || market === "KRX") {
          badge.textContent = t("currencyBadgeKRW");
        } else if (cur === "USD" || market === "NASDAQ" || market === "NYSE" || market === "US") {
          badge.textContent = t("currencyBadgeUSD");
        } else {
          badge.textContent = "";
        }
      }

      function setIfBlank(elementId, value) {
        const field = document.getElementById(elementId);
        if (!field) return;
        if (isBlank(field.value) && !isBlank(value)) {
          field.value = value;
        }
      }

      async function autofillWatchlistFields({ ticker = "", companyName = "" } = {}) {
        if (state.watchlistEditTicker || state.watchlistAutofillLoading) {
          return;
        }

        const normalizedTicker = (ticker || "").toUpperCase().trim();
        const normalizedCompany = (companyName || "").trim();
        if (!normalizedTicker && !normalizedCompany) {
          return;
        }

        const title = document.getElementById("watchlistModalTitle");
        const tickerField = document.getElementById("watchlistTicker");
        const companyField = document.getElementById("watchlistCompanyName");
        const originalTitle = getModalBaseTitle(false);

        try {
          state.watchlistAutofillLoading = true;
          setWatchlistAutofillButtonsDisabled(true);
          title.textContent = `${originalTitle} ${t("modalAutofillingSuffix")}`;
          tickerField.disabled = true;
          companyField.disabled = true;

          const params = new URLSearchParams();
          if (normalizedTicker) params.set("ticker", normalizedTicker);
          if (!normalizedTicker && normalizedCompany) params.set("company_name", normalizedCompany);
          params.set("lang", state.language);

          const enriched = await apiFetch(`/api/watchlist/enrich?${params.toString()}`);

          setIfBlank("watchlistTicker", enriched.ticker);
          setIfBlank("watchlistCompanyName", enriched.company_name);
          setIfBlank("watchlistMarket", enriched.market);

          const idealEntryField = document.getElementById("watchlistIdealEntry");
          if (isBlank(idealEntryField.value) && enriched.ideal_entry !== null && enriched.ideal_entry !== undefined) {
            idealEntryField.value = enriched.ideal_entry;
          }

          setIfBlank("watchlistWatchReason", enriched.watch_reason);
          setIfBlank("watchlistTriggerCondition", enriched.trigger_condition);
          setIfBlank("watchlistInvalidation", enriched.invalidation);
          setIfBlank("watchlistRiskNotes", enriched.risk_notes);

          setWatchlistCurrencyBadge(enriched.currency, enriched.market);

          showToast(t("autofillDone"));
        } catch (error) {
          showToast(t("autofillFailed", { error: error.message }), true);
        } finally {
          state.watchlistAutofillLoading = false;
          setWatchlistAutofillButtonsDisabled(false);
          title.textContent = originalTitle;
          tickerField.disabled = false;
          companyField.disabled = false;
        }
      }

      function openWatchlistModal(ticker = null) {
        state.watchlistEditTicker = ticker;
        syncModalTitles();
        
        if (ticker) {
          fetch(`/api/watchlist`)
            .then((r) => r.json())
            .then((rows) => {
              const found = rows.find((r) => r.ticker === ticker);
              if (found) {
                document.getElementById("watchlistTicker").value = found.ticker;
                document.getElementById("watchlistTicker").disabled = true;
                document.getElementById("watchlistCompanyName").value = found.company_name;
                document.getElementById("watchlistMarket").value = found.market;
                document.getElementById("watchlistIdealEntry").value = found.ideal_entry;
                document.getElementById("watchlistWatchReason").value = found.watch_reason;
                document.getElementById("watchlistTriggerCondition").value = found.trigger_condition;
                document.getElementById("watchlistInvalidation").value = found.invalidation;
                document.getElementById("watchlistRiskNotes").value = found.risk_notes;
                document.getElementById("watchlistPriority").value = found.priority;
                setWatchlistCurrencyBadge("", found.market);
              }
            });
        } else {
          document.getElementById("watchlistTicker").disabled = false;
          watchlistForm.reset();
          state.watchlistAutofillLoading = false;
          setWatchlistCurrencyBadge("", "");
        }
        
        watchlistModal.classList.add("active");
      }

      function closeWatchlistModal() {
        if (state.watchlistAutofillLoading) {
          return;
        }
        watchlistModal.classList.remove("active");
        document.getElementById("watchlistTicker").disabled = false;
        document.getElementById("watchlistCompanyName").disabled = false;
        watchlistForm.reset();
        state.watchlistEditTicker = null;
        state.watchlistAutofillLoading = false;
        setWatchlistCurrencyBadge("", "");
      }

      async function saveWatchlist(e) {
        e.preventDefault();
        const ticker = document.getElementById("watchlistTicker").value.toUpperCase().trim();

        const idealEntryRaw = document.getElementById("watchlistIdealEntry").value;
        const priorityRaw = document.getElementById("watchlistPriority").value;

        if (isBlank(idealEntryRaw)) {
          showToast(t("watchlistIdealEntryEmpty"), true);
          return;
        }

        const idealEntry = Number(idealEntryRaw);
        if (Number.isNaN(idealEntry)) {
          showToast(t("watchlistIdealEntryInvalid"), true);
          return;
        }

        const priority = Number(priorityRaw || 3);
        if (Number.isNaN(priority)) {
          showToast(t("priorityInvalid"), true);
          return;
        }

        const body = {
          ticker,
          company_name: document.getElementById("watchlistCompanyName").value,
          market: document.getElementById("watchlistMarket").value,
          watch_reason: document.getElementById("watchlistWatchReason").value,
          ideal_entry: idealEntry,
          trigger_condition: document.getElementById("watchlistTriggerCondition").value,
          invalidation: document.getElementById("watchlistInvalidation").value,
          risk_notes: document.getElementById("watchlistRiskNotes").value,
          priority: priority,
        };

        try {
          if (state.watchlistEditTicker) {
            await apiFetch(`/api/watchlist/${state.watchlistEditTicker}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            showToast(t("watchlistUpdated"));
          } else {
            await apiFetch("/api/watchlist", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            showToast(t("watchlistAdded"));
          }
          closeWatchlistModal();
          await loadWatchlist();
        } catch (error) {
          showToast(error.message, true);
        }
      }

      async function deleteWatchlist(ticker) {
        if (!confirm(t("deleteConfirm", { ticker }))) return;
        try {
          await apiFetch(`/api/watchlist/${ticker}`, { method: "DELETE" });
          showToast(t("watchlistDeleted"));
          await loadWatchlist();
        } catch (error) {
          showToast(error.message, true);
        }
      }

      async function loadWatchlist() {
        const grid = document.getElementById("watchlistGrid");
        grid.innerHTML = "";

        try {
          const rows = await apiFetch("/api/watchlist");
          if (!rows.length) {
            grid.innerHTML = `<div class="col-span-2 text-center text-slate-500 py-4">${t("noData")}</div>`;
            return;
          }

          const html = rows
            .map(
              (row) => {
                const priorityLabel = `P${row.priority}`;
                const triggerCondition = row.trigger_condition || "-";
                const invalidation = row.invalidation || "-";
                return `
                  <div class="rounded-xl border border-slate-700 p-4" style="background-color: var(--card)">
                    <!-- 헤더: Ticker, Market, Priority -->
                    <div class="mb-3 flex items-center justify-between border-b border-slate-700 pb-2">
                      <div class="flex items-center gap-2">
                        <a href="${getTickerLink(row.ticker, row.market)}" target="_blank" rel="noopener noreferrer" class="font-bold text-lg text-amber-300 hover:text-amber-100 hover:underline">${row.ticker}</a>
                        <span class="text-xs text-slate-500">${row.market}</span>
                        <span class="text-xs bg-amber-500/20 text-amber-300 px-2 py-0.5 rounded">${priorityLabel}</span>
                      </div>
                      <div class="flex gap-1">
                        <button onclick="openWatchlistModal('${row.ticker}')" class="rounded px-2 py-1.5 text-xs text-slate-300 hover:bg-amber-500/20 hover:text-amber-300">${t("edit")}</button>
                        <button onclick="deleteWatchlist('${row.ticker}')" class="rounded px-2 py-1.5 text-xs text-slate-300 hover:bg-red-500/20 hover:text-red-300">${t("delete")}</button>
                      </div>
                    </div>
                    
                    <!-- 종목명 -->
                    <p class="mb-3 text-lg font-semibold text-slate-100">${row.company_name}</p>
                    
                    <!-- 세부 정보 -->
                    <div class="space-y-2 text-xs text-slate-300">
                      <div>
                        <p class="text-slate-500 text-xs mb-0.5">${t("watchReasonCard")}</p>
                        <p class="text-sm">${row.watch_reason || "-"}</p>
                      </div>
                      <div class="grid grid-cols-2 gap-2">
                        <div>
                          <p class="text-slate-500 text-xs mb-0.5">${t("idealEntryCard")}</p>
                          <p class="font-semibold text-amber-300">${formatNumber(row.ideal_entry, 2)}</p>
                        </div>
                        <div>
                          <p class="text-slate-500 text-xs mb-0.5">${t("triggerConditionCard")}</p>
                          <p class="text-sm">${triggerCondition}</p>
                        </div>
                      </div>
                      <div>
                        <p class="text-slate-500 text-xs mb-0.5">${t("invalidationCard")}</p>
                        <p class="text-sm">${invalidation}</p>
                      </div>
                      <div>
                        <p class="text-slate-500 text-xs mb-0.5">${t("riskItemCard")}</p>
                        <p class="text-sm">${row.risk_notes || "-"}</p>
                      </div>
                    </div>
                  </div>
                `;
              },
            )
            .join("");

          grid.innerHTML = html;
        } catch (error) {
          grid.innerHTML = `<div class="col-span-2 text-center text-red-400 py-4">${error.message}</div>`;
        }
      }

      // Event Listeners
      navTabs.forEach((tab) => {
        tab.addEventListener("click", async () => {
          const target = tab.dataset.tab;
          setMainTab(target);
          if (target === "portfolio") {
            await loadPortfolio();
          }
          if (target === "watchlist") {
            await loadWatchlist();
          }
        });
      });

      viewerTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          setViewerTab(tab.dataset.viewerTab);
        });
      });

      reportSelect.addEventListener("change", () => {
        loadReport(state.viewerType, reportSelect.value);
      });

      document.getElementById("runDailyBtn").addEventListener("click", () => {
        runBriefing("runDailyBtn", "runDailySpinner", "runDailyDone");
      });

      document.getElementById("runWeeklyBtn").addEventListener("click", () => {
        runBriefing("runWeeklyBtn", "runWeeklySpinner", "runWeeklyDone");
      });

      languageSelect.addEventListener("change", async (event) => {
        await setLanguage(event.target.value);
      });

      document.getElementById("addPortfolioBtn").addEventListener("click", () => openPortfolioModal());
      document.getElementById("portfolioWatchlistSelect").addEventListener("change", fillPortfolioFromWatchlist);
      document.getElementById("closePortfolioModal").addEventListener("click", closePortfolioModal);
      portfolioForm.addEventListener("submit", savePortfolio);
      portfolioModal.addEventListener("click", (e) => {
        if (!state.portfolioAutofillLoading && e.target === portfolioModal) closePortfolioModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && portfolioModal.classList.contains("active") && !state.portfolioAutofillLoading) closePortfolioModal();
      });

      document.getElementById("addWatchlistBtn").addEventListener("click", () => openWatchlistModal());
      document.getElementById("closeWatchlistModal").addEventListener("click", closeWatchlistModal);
      watchlistForm.addEventListener("submit", saveWatchlist);
      document.getElementById("watchlistTicker").addEventListener("blur", () => {
        const ticker = document.getElementById("watchlistTicker").value;
        autofillWatchlistFields({ ticker });
      });
      document.getElementById("watchlistCompanyName").addEventListener("blur", () => {
        const ticker = document.getElementById("watchlistTicker").value;
        const companyName = document.getElementById("watchlistCompanyName").value;
        autofillWatchlistFields({ ticker, companyName });
      });
      watchlistModal.addEventListener("click", (e) => {
        if (!state.watchlistAutofillLoading && e.target === watchlistModal) closeWatchlistModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && watchlistModal.classList.contains("active") && !state.watchlistAutofillLoading) closeWatchlistModal();
      });

      state.language = getInitialLanguage();
      applyTranslations();
      setMainTab("dashboard");
      setViewerTab("daily");
      refreshDashboard();
    </script>
  </body>
</html>
