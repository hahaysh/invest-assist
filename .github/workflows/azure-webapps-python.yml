name: Deploy Webapp1 to Azure Linux VM

on:
  push:
    branches:
      - main
    paths:
      - webapp/**
      - .github/workflows/azure-webapps-python.yml
  workflow_dispatch:
    inputs:
      dry_run:
        description: "점검 및 rsync 드라이런만 실행 (서비스 재시작 없음)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      rollback_on_failure:
        description: "배포 실패 시 자동 롤백 실행"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: deploy-azure-linux-vm-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_TARGET_DIR: /home/hahaysh/webapp1/webapp
  VENV_PYTHON: /home/hahaysh/webapp1/venv/bin/python

  # webapp1은 systemd "user" 서비스로 운영 중이므로, user service 이름에 맞춰야 함
  SERVICE_NAME: webapp1-uvicorn

  APP_PORT: "8001"
  BACKUP_RETENTION_DAYS: "7"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.hahayshopenclawssh }}" ]; then
