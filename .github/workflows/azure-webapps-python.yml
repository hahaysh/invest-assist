name: Deploy Webapp1 to Azure Linux VM

on:
  push:
    branches:
      - main
    paths:
      - webapp/**
      - .github/workflows/azure-webapps-python.yml
  workflow_dispatch:
    inputs:
      dry_run:
        description: "점검 및 rsync 드라이런만 실행 (서비스 재시작 없음)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      rollback_on_failure:
        description: "배포 실패 시 자동 롤백 실행"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: deploy-azure-linux-vm-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_TARGET_DIR: /home/hahaysh/webapp1/webapp
  VENV_PYTHON: /home/hahaysh/webapp1/venv/bin/python

  # webapp1은 systemd "user" 서비스로 운영 중이므로, user service 이름에 맞춰야 함
  SERVICE_NAME: webapp1-uvicorn

  APP_PORT: "8001"
  BACKUP_RETENTION_DAYS: "7"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.hahayshopenclawssh }}" ]; then
            echo "Missing secret: hahayshopenclawssh"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_HOST }}" ]; then
            echo "Missing secret: DEPLOY_SSH_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_USER }}" ]; then
            echo "Missing secret: DEPLOY_SSH_USER"
            exit 1
          fi

      - name: Prepare SSH key and known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.hahayshopenclawssh }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH connectivity check
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "echo SSH_OK"

      - name: Set deployment metadata
        id: meta
        run: |
          set -euo pipefail
          echo "backup_ts=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Remote pre-checks
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            DEPLOY_TARGET_DIR="/home/hahaysh/webapp1/webapp"
            VENV_PYTHON="/home/hahaysh/webapp1/venv/bin/python"

            mkdir -p "$DEPLOY_TARGET_DIR"
            test -x "$VENV_PYTHON"

            # rsync 반드시 필요: 없으면 여기서 실패 처리
            command -v rsync >/dev/null 2>&1

            # systemd user service 안정화를 위해 linger + runtime dir 확인(실패해도 배포는 계속 가능하게)
            loginctl enable-linger "$USER" >/dev/null 2>&1 || true
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            test -d "$XDG_RUNTIME_DIR" || true
          '

      - name: Backup current webapp
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            DEPLOY_TARGET_DIR="/home/hahaysh/webapp1/webapp"
            BACKUP_DIR="$HOME/webapp-backups/webapp-${{ steps.meta.outputs.backup_ts }}"
            mkdir -p "$HOME/webapp-backups"

            if [ -d "$DEPLOY_TARGET_DIR" ]; then
              # 구조 꼬임 방지: rsync로 디렉터리 내용을 백업 디렉터리에 복제
              mkdir -p "$BACKUP_DIR"
              rsync -a --delete "$DEPLOY_TARGET_DIR"/ "$BACKUP_DIR"/
            fi

            echo "Backup dir: $BACKUP_DIR"
          '

      - name: Rsync dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          set -euo pipefail
          rsync -azvn --delete \
            --exclude="__pycache__/" \
            --exclude="*.pyc" \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./webapp/ \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ env.DEPLOY_TARGET_DIR }}/"

      - name: Rsync webapp to VM
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude="__pycache__/" \
            --exclude="*.pyc" \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./webapp/ \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ env.DEPLOY_TARGET_DIR }}/"

      - name: Install Python dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            DEPLOY_TARGET_DIR="/home/hahaysh/webapp1/webapp"
            VENV_PYTHON="/home/hahaysh/webapp1/venv/bin/python"

            cd "$DEPLOY_TARGET_DIR"
            "$VENV_PYTHON" -m pip install --upgrade pip
            # 작은 VM에서 pip 캐시로 인한 디스크/메모리 폭주 완화
            "$VENV_PYTHON" -m pip install --no-cache-dir -r requirements.txt
          '

      - name: Restart webapp1 (systemd user service)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            SERVICE_NAME="webapp1-uvicorn"
            APP_PORT="8001"

            # systemd --user 안정화 (비대화형 SSH에서도 동작하도록)
            loginctl enable-linger "$USER" >/dev/null 2>&1 || true
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"

            # 포트 점유 프로세스만 정리(과격한 pkill 방지)
            if command -v lsof >/dev/null 2>&1; then
              PID="$(lsof -ti tcp:${APP_PORT} || true)"
              if [ -n "$PID" ]; then
                echo "Killing PID(s) on port ${APP_PORT}: $PID"
                kill -9 $PID || true
              fi
            elif command -v fuser >/dev/null 2>&1; then
              fuser -k "${APP_PORT}/tcp" || true
            fi

            systemctl --user daemon-reload
            systemctl --user restart "${SERVICE_NAME}.service"
            systemctl --user is-active --quiet "${SERVICE_NAME}.service"
          '

      - name: Health and API checks
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            SERVICE_NAME="webapp1-uvicorn"
            APP_PORT="8001"

            loginctl enable-linger "$USER" >/dev/null 2>&1 || true
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:$APP_PORT/health" >/dev/null \
                && curl -fsS "http://127.0.0.1:$APP_PORT/api/status" >/dev/null; then
                echo "Health checks passed on attempt $attempt"
                exit 0
              fi
              sleep 2
            done

            echo "Health checks failed - dumping diagnostics..."
            systemctl --user status "${SERVICE_NAME}.service" --no-pager -l || true
            journalctl --user -u "${SERVICE_NAME}.service" -n 200 --no-pager || true
            ss -lntp | grep ":$APP_PORT" || true
            exit 1
          '

      - name: Rollback on failure
        if: ${{ failure() && (github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_on_failure == 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            DEPLOY_TARGET_DIR="/home/hahaysh/webapp1/webapp"
            VENV_PYTHON="/home/hahaysh/webapp1/venv/bin/python"
            SERVICE_NAME="webapp1-uvicorn"
            APP_PORT="8001"
            BACKUP_DIR="$HOME/webapp-backups/webapp-${{ steps.meta.outputs.backup_ts }}"

            loginctl enable-linger "$USER" >/dev/null 2>&1 || true
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"

            if [ ! -d "$BACKUP_DIR" ]; then
              echo "Rollback backup not found: $BACKUP_DIR"
              exit 1
            fi

            # 안전하게 복원: rsync로 백업 -> 타겟
            mkdir -p "$DEPLOY_TARGET_DIR"
            rsync -a --delete "$BACKUP_DIR"/ "$DEPLOY_TARGET_DIR"/

            cd "$DEPLOY_TARGET_DIR"
            "$VENV_PYTHON" -m pip install --no-cache-dir -r requirements.txt

            # 포트 점유만 정리
            if command -v lsof >/dev/null 2>&1; then
              PID="$(lsof -ti tcp:${APP_PORT} || true)"
              if [ -n "$PID" ]; then
                echo "Killing PID(s) on port ${APP_PORT}: $PID"
                kill -9 $PID || true
              fi
            elif command -v fuser >/dev/null 2>&1; then
              fuser -k "${APP_PORT}/tcp" || true
            fi

            systemctl --user daemon-reload
            systemctl --user restart "${SERVICE_NAME}.service"
            systemctl --user is-active --quiet "${SERVICE_NAME}.service"
          '

      - name: Service logs (webapp1-uvicorn)
        if: ${{ always() }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            SERVICE_NAME="webapp1-uvicorn"
            loginctl enable-linger "$USER" >/dev/null 2>&1 || true
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            journalctl --user -u "${SERVICE_NAME}.service" -n 120 --no-pager || true
          '

      - name: Cleanup old backups
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" '
            set -euo pipefail
            BACKUP_RETENTION_DAYS="7"
            if [ -d "$HOME/webapp-backups" ]; then
              find "$HOME/webapp-backups" -mindepth 1 -maxdepth 1 -type d -mtime +"$BACKUP_RETENTION_DAYS" -exec rm -rf {} +
            fi
          '
